<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixd</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface-2: #1c1c28;
      --surface-hover: #22222e;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-dim: #9898aa;
      --text-faint: #5a5a70;
      --accent: #7c5cfc;
      --accent-glow: #7c5cfc33;
      --green: #1ed760;
      --green-dim: #1ed76033;
      --red: #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #7c5cfc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Search bar */
    .search-bar {
      flex: 1;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      background: var(--surface-2);
      border: none;
      border-radius: 500px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .search-bar input:focus {
      background: var(--surface-hover);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .search-bar input::placeholder { color: var(--text-faint); }

    .search-bar svg {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
    }

    /* Config toggle */
    .config-toggle {
      color: var(--text-dim);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 50%;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .config-toggle:hover { background: var(--surface-2); }

    .config-panel {
      display: none;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 1rem;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .config-panel.open { display: flex; flex-wrap: wrap; }

    .config-panel input {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    .config-panel input:focus { border-color: var(--accent); }
    .config-panel input::placeholder { color: var(--text-faint); }

    .health-indicator {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      cursor: pointer;
    }
    .health-indicator.ok { background: var(--green); }
    .health-indicator.err { background: var(--red); }

    /* Status */
    .status {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-faint);
      font-size: 0.95rem;
    }
    .status.error { color: var(--red); }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === Spotify-style search results === */

    /* Top result + Songs side by side */
    .search-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 800px) {
      .search-grid { grid-template-columns: 1fr; }
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    /* Top Result card */
    .top-result-card {
      background: var(--surface);
      border-radius: 8px;
      padding: 1.25rem;
      cursor: pointer;
      transition: background 0.3s;
      position: relative;
    }
    .top-result-card:hover { background: var(--surface-hover); }

    .top-result-art {
      width: 92px; height: 92px;
      border-radius: 4px;
      background: var(--surface-2);
      overflow: hidden;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      font-size: 2rem;
    }
    .top-result-art.round { border-radius: 50%; }
    .top-result-art img { width: 100%; height: 100%; object-fit: cover; }

    .top-result-title {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .top-result-sub {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .top-result-type {
      display: inline-block;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 500px;
      margin-top: 0.75rem;
      text-transform: uppercase;
    }

    .play-fab {
      position: absolute;
      bottom: 1.25rem;
      right: 1.25rem;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
    .play-fab svg { fill: #000; width: 20px; height: 20px; }
    .top-result-card:hover .play-fab,
    .song-row:hover .play-fab-small {
      opacity: 1;
      transform: translateY(0);
    }

    /* Songs list */
    .song-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      transition: background 0.2s;
      cursor: default;
      position: relative;
    }
    .song-row:hover { background: var(--surface-hover); }

    .song-num {
      width: 20px;
      text-align: right;
      color: var(--text-faint);
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .song-row:hover .song-num { visibility: hidden; }
    .song-row .play-icon-small {
      position: absolute;
      left: 0.75rem;
      color: var(--text);
      display: none;
    }
    .song-row:hover .play-icon-small { display: block; }

    .song-art {
      width: 40px; height: 40px;
      border-radius: 4px;
      background: var(--surface-2);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      font-size: 0.9rem;
    }
    .song-art img { width: 100%; height: 100%; object-fit: cover; }

    .song-info { flex: 1; min-width: 0; }

    .song-title {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-artist {
      color: var(--text-dim);
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-album {
      color: var(--text-dim);
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      text-align: right;
      display: none;
    }
    @media (min-width: 700px) { .song-album { display: block; } }

    .song-action {
      flex-shrink: 0;
    }

    .btn-sm {
      padding: 0.35rem 0.75rem;
      border: none;
      border-radius: 500px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      color: #fff;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-sm:active { transform: scale(0.95); }
    .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sm.dl { background: var(--accent); }
    .btn-sm.dl.busy { background: var(--surface-2); color: var(--text-dim); }
    .btn-sm.play { background: var(--green); color: #000; }

    /* Artist horizontal scroll */
    .artists-row {
      display: flex;
      gap: 1.25rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: none;
    }
    .artists-row::-webkit-scrollbar { display: none; }

    .artist-chip {
      flex-shrink: 0;
      width: 140px;
      text-align: center;
      cursor: pointer;
      padding: 1rem;
      border-radius: 8px;
      background: var(--surface);
      transition: background 0.3s;
    }
    .artist-chip:hover { background: var(--surface-hover); }

    .artist-chip-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      margin: 0 auto 0.75rem;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .artist-chip-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .artist-chip-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist-chip-type {
      color: var(--text-faint);
      font-size: 0.75rem;
      margin-top: 0.15rem;
    }

    /* Artist page */
    .artist-hero {
      display: flex;
      align-items: flex-end;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding: 2rem 0;
    }

    .artist-hero-avatar {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .artist-hero-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .artist-hero-info h1 {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
    }

    .artist-hero-info .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .tag-pill {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 500px;
      background: var(--surface-2);
      color: var(--text-dim);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    /* Song table header */
    .song-table-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.5rem;
      color: var(--text-faint);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .song-table-header .col-num { width: 20px; text-align: right; }
    .song-table-header .col-title { flex: 1; }
    .song-table-header .col-album { flex: 1; text-align: right; display: none; }
    @media (min-width: 700px) { .song-table-header .col-album { display: block; } }
    .song-table-header .col-action { width: 90px; }

    /* Player */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0.5rem 1.5rem;
      display: none;
      align-items: center;
      gap: 1rem;
      z-index: 100;
    }
    .player-bar.visible { display: flex; }

    .player-art {
      width: 56px; height: 56px;
      border-radius: 4px;
      background: var(--surface-2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .player-art img { width: 100%; height: 100%; object-fit: cover; }

    .player-info { flex-shrink: 0; min-width: 0; max-width: 180px; }
    .player-info .title { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-info .artist { color: var(--text-dim); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .player-controls { flex: 1; display: flex; align-items: center; gap: 0.75rem; }
    .player-controls button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.2rem; padding: 0.25rem; }
    .player-controls button:hover { color: var(--green); }

    .progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
    .player-time { color: var(--text-faint); font-size: 0.7rem; font-variant-numeric: tabular-nums; flex-shrink: 0; }

    /* Toast */
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 200; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 0.6rem 1rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem; animation: slideIn 0.25s ease; max-width: 320px; }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

    @media (max-width: 600px) {
      .artist-hero { flex-direction: column; align-items: center; text-align: center; }
      .artist-hero-avatar { width: 120px; height: 120px; font-size: 2.5rem; }
      .artist-hero-info h1 { font-size: 2rem; }
      .player-info { max-width: 100px; }
      .top-result-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo" onclick="navigateTo('/')">Mixd</div>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="What do you want to listen to?" autocomplete="off">
      </div>
      <div class="config-toggle" id="configToggle" onclick="document.getElementById('configPanel').classList.toggle('open')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </div>
    </header>

    <div class="config-panel" id="configPanel">
      <input type="text" id="apiUrl" placeholder="API URL (e.g. http://localhost:6493)">
      <input type="password" id="apiKey" placeholder="API Key">
      <div class="health-indicator" id="healthDot" onclick="checkHealth()" title="Check connection"></div>
    </div>

    <div id="content">
      <div class="status">What do you want to listen to?</div>
    </div>
  </div>

  <div class="player-bar" id="playerBar">
    <div class="player-art" id="playerArt"></div>
    <div class="player-info">
      <div class="title" id="playerTitle">&mdash;</div>
      <div class="artist" id="playerArtist">&mdash;</div>
    </div>
    <div class="player-controls">
      <button id="playPauseBtn" onclick="togglePlayPause()">&#9654;</button>
      <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="player-time" id="playerTime">0:00 / 0:00</span>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>
  <audio id="audioEl"></audio>

  <script>
    // === State ===
    let searchResults = [];
    let searchArtists = [];
    let downloadedMbids = new Set();
    let downloadedSongs = {};
    const audio = document.getElementById('audioEl');
    const searchCache = new Map();
    const CACHE_TTL = 3600000;

    // Elements
    const apiUrlEl = document.getElementById('apiUrl');
    const apiKeyEl = document.getElementById('apiKey');
    const searchEl = document.getElementById('searchInput');
    const contentEl = document.getElementById('content');
    const healthDot = document.getElementById('healthDot');
    const playerBar = document.getElementById('playerBar');

    // Persist config
    if (localStorage.getItem('mixd_url')) apiUrlEl.value = localStorage.getItem('mixd_url');
    if (localStorage.getItem('mixd_key')) apiKeyEl.value = localStorage.getItem('mixd_key');
    apiUrlEl.addEventListener('change', () => localStorage.setItem('mixd_url', apiUrlEl.value));
    apiKeyEl.addEventListener('change', () => localStorage.setItem('mixd_key', apiKeyEl.value));

    function baseUrl() { return (apiUrlEl.value || window.location.origin).replace(/\/+$/, ''); }
    function headers() { return { 'Content-Type': 'application/json', 'X-API-Key': apiKeyEl.value }; }

    async function apiPost(path, body) {
      const r = await fetch(baseUrl() + path, { method: 'POST', headers: headers(), body: JSON.stringify(body) });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.status); }
      return r.json();
    }

    async function apiGet(path) {
      const r = await fetch(baseUrl() + path, { headers: headers() });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.status); }
      return r.json();
    }

    async function loadDownloadedSongs() {
      try { downloadedMbids = new Set(await apiGet('/api/songs/downloaded')); } catch {}
    }

    async function checkHealth() {
      try {
        const d = await fetch(baseUrl() + '/api/health').then(r => r.json());
        healthDot.className = 'health-indicator ok';
        healthDot.title = `${d.songs_count} songs, ${d.storage_used_mb.toFixed(1)} MB`;
      } catch {
        healthDot.className = 'health-indicator err';
      }
    }

    // === Routing ===
    function navigateTo(path) { history.pushState(null, '', path); handleRoute(); }
    window.addEventListener('popstate', handleRoute);

    function handleRoute() {
      const path = window.location.pathname;
      const params = new URLSearchParams(window.location.search);

      if (path.startsWith('/artist/')) {
        const id = path.split('/artist/')[1];
        if (id) { loadArtistPage(id); return; }
      }
      if (params.has('q')) {
        searchEl.value = params.get('q');
        doSearch(false);
      } else {
        searchEl.value = '';
        contentEl.innerHTML = '<div class="status">What do you want to listen to?</div>';
      }
    }

    // === Search ===
    let searchTimeout = null;
    let activeAbort = null;

    searchEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        clearTimeout(searchTimeout);
        const q = searchEl.value.trim();
        if (q) history.replaceState(null, '', '/?q=' + encodeURIComponent(q));
        doSearch(false);
      }
    });

    searchEl.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const q = searchEl.value.trim();
      if (q.length < 2) return;

      const ck = q.toLowerCase();
      const c = searchCache.get(ck);
      if (c && Date.now() - c.ts < CACHE_TTL) {
        searchResults = c.results; searchArtists = c.artists;
        renderSearch(); return;
      }
      searchTimeout = setTimeout(() => doSearch(true), 400);
    });

    async function doSearch(fast = false) {
      const q = searchEl.value.trim();
      if (!q) return;
      if (!apiKeyEl.value) { toast('Enter API key in settings', 'error'); return; }

      const ck = q.toLowerCase();
      const c = searchCache.get(ck);
      if (c && Date.now() - c.ts < CACHE_TTL) {
        searchResults = c.results; searchArtists = c.artists;
        renderSearch(); return;
      }

      if (activeAbort) activeAbort.abort();
      activeAbort = new AbortController();
      contentEl.innerHTML = '<div class="status"><div class="spinner"></div></div>';

      try {
        const data = await fetch(baseUrl() + '/api/search' + (fast ? '?fast=true' : ''), {
          method: 'POST', headers: headers(),
          body: JSON.stringify({ query: q }),
          signal: activeAbort.signal,
        }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

        searchResults = data.results || [];
        searchArtists = data.artists || [];
        searchCache.set(ck, { results: searchResults, artists: searchArtists, ts: Date.now() });
        renderSearch();
      } catch (e) {
        if (e.name === 'AbortError') return;
        contentEl.innerHTML = `<div class="status error">${escHtml(e.message)}</div>`;
      }
    }

    // === Render Spotify-style search ===
    function renderSearch() {
      if (!searchResults.length && !searchArtists.length) {
        contentEl.innerHTML = '<div class="status">No results found</div>';
        return;
      }

      let html = '';

      // Top Result + Songs grid
      const topArtist = searchArtists[0];
      const topSong = searchResults[0];
      const hasTop = topArtist || topSong;
      const songs = searchResults.slice(0, 6);

      if (hasTop) {
        html += '<div class="search-grid">';

        // Left: Top Result
        html += '<div><div class="section-title">Top result</div>';
        if (topArtist) {
          html += `<div class="top-result-card" onclick="navigateTo('/artist/${escAttr(topArtist.musicbrainz_id)}')">
            <div class="top-result-art round">${avatarHtml(topArtist)}</div>
            <div class="top-result-title">${escHtml(topArtist.name)}</div>
            <div class="top-result-sub">${escHtml((topArtist.tags || []).slice(0, 3).join(', '))}</div>
            <span class="top-result-type">Artist</span>
            <button class="play-fab" onclick="event.stopPropagation(); playArtistTop('${escAttr(topArtist.musicbrainz_id)}')">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>`;
        } else if (topSong) {
          const dl = isDownloaded(topSong.musicbrainz_id);
          html += `<div class="top-result-card" onclick="${dl ? `fetchAndPlay('${escAttr(topSong.musicbrainz_id)}')` : `downloadSong('${escAttr(topSong.musicbrainz_id)}','top-dl')`}">
            <div class="top-result-art">${albumArtImg(topSong)}</div>
            <div class="top-result-title">${escHtml(topSong.title)}</div>
            <div class="top-result-sub">${escHtml(topSong.artist)}</div>
            <span class="top-result-type">Song</span>
            <button class="play-fab" onclick="event.stopPropagation(); ${dl ? `fetchAndPlay('${escAttr(topSong.musicbrainz_id)}')` : `downloadSong('${escAttr(topSong.musicbrainz_id)}','top-dl')`}">
              <svg viewBox="0 0 24 24"><path d="${dl ? 'M8 5v14l11-7z' : 'M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'}"/></svg>
            </button>
          </div>`;
        }
        html += '</div>';

        // Right: Songs
        html += '<div><div class="section-title">Songs</div>';
        songs.forEach((r, i) => { html += songRow(r, i); });
        html += '</div></div>';
      }

      // Artists row
      if (searchArtists.length > 0) {
        html += '<div class="section-title" style="margin-top:1rem">Artists</div>';
        html += '<div class="artists-row">';
        searchArtists.forEach(a => {
          html += `<div class="artist-chip" onclick="navigateTo('/artist/${escAttr(a.musicbrainz_id)}')">
            <div class="artist-chip-avatar">${avatarHtml(a)}</div>
            <div class="artist-chip-name">${escHtml(a.name)}</div>
            <div class="artist-chip-type">${escHtml(a.type || 'Artist')}</div>
          </div>`;
        });
        html += '</div>';
      }

      // Remaining songs
      if (searchResults.length > 6) {
        html += '<div class="section-title" style="margin-top:1.5rem">More songs</div>';
        searchResults.slice(6).forEach((r, i) => { html += songRow(r, i + 6); });
      }

      contentEl.innerHTML = html;
    }

    function songRow(r, i) {
      const dl = isDownloaded(r.musicbrainz_id);
      const btnId = `sr-${i}`;
      const btn = dl
        ? `<button class="btn-sm play" onclick="event.stopPropagation(); fetchAndPlay('${escAttr(r.musicbrainz_id)}')">&#9654; Play</button>`
        : `<button class="btn-sm dl" id="${btnId}" onclick="event.stopPropagation(); downloadSong('${escAttr(r.musicbrainz_id)}','${btnId}')">+ Add</button>`;

      return `<div class="song-row" ondblclick="handleSongClick('${escAttr(r.musicbrainz_id)}','${btnId}')">
        <span class="song-num">${i + 1}</span>
        <span class="play-icon-small">&#9654;</span>
        <div class="song-art">${albumArtImg(r)}</div>
        <div class="song-info">
          <div class="song-title">${escHtml(r.title)}</div>
          <div class="song-artist">${escHtml(r.artist)}</div>
        </div>
        <div class="song-album">${escHtml(r.album || '')}</div>
        <div class="song-action">${btn}</div>
      </div>`;
    }

    function handleSongClick(mbid, btnId) {
      if (isDownloaded(mbid)) fetchAndPlay(mbid);
      else downloadSong(mbid, btnId);
    }

    // === Artist page ===
    async function loadArtistPage(artistId) {
      contentEl.innerHTML = '<div class="status"><div class="spinner"></div></div>';
      searchEl.value = '';
      try {
        const artist = await apiGet(`/api/artist/${artistId}?limit=100`);
        renderArtistPage(artist);
      } catch (e) {
        contentEl.innerHTML = `<div class="status error">Failed: ${escHtml(e.message)}</div>`;
      }
    }

    function renderArtistPage(a) {
      let html = `<div class="back-btn" onclick="history.back()">\u2190 Back</div>`;

      html += `<div class="artist-hero">
        <div class="artist-hero-avatar">${avatarHtml(a)}</div>
        <div class="artist-hero-info">
          <h1>${escHtml(a.name)}</h1>
          ${a.tags.length ? `<div class="tags">${a.tags.map(t => `<span class="tag-pill">${escHtml(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>`;

      html += `<div class="section-title">Popular</div>`;
      html += `<div class="song-table-header">
        <span class="col-num">#</span>
        <span style="width:40px"></span>
        <span class="col-title">Title</span>
        <span class="col-album">Album</span>
        <span style="width:90px"></span>
      </div>`;

      a.top_songs.forEach((r, i) => { html += songRow(r, i); });

      contentEl.innerHTML = html;
    }

    async function playArtistTop(artistId) {
      // Play the first downloaded song from this artist, or download the first one
      const artist = searchArtists.find(a => a.musicbrainz_id === artistId);
      if (!artist || !artist.top_songs.length) return;
      const first = artist.top_songs[0];
      if (isDownloaded(first.musicbrainz_id)) fetchAndPlay(first.musicbrainz_id);
      else downloadSong(first.musicbrainz_id, 'top-play');
    }

    // === Download ===
    async function downloadSong(mbid, btnId) {
      const btn = btnId ? document.getElementById(btnId) : null;
      if (btn) { btn.disabled = true; btn.classList.add('busy'); btn.textContent = '...'; }

      try {
        const song = await apiPost('/api/download', { musicbrainz_id: mbid });
        downloadedSongs[mbid] = song;
        downloadedMbids.add(mbid);
        toast(`"${song.title}" added`, 'success');

        if (window.location.pathname.startsWith('/artist/'))
          loadArtistPage(window.location.pathname.split('/artist/')[1]);
        else renderSearch();

        playSong(mbid);
      } catch (e) {
        toast(`Failed: ${e.message}`, 'error');
        if (btn) { btn.disabled = false; btn.classList.remove('busy'); btn.textContent = '+ Add'; }
      }
    }

    // === Player ===
    async function fetchAndPlay(mbid) {
      if (!downloadedSongs[mbid]) {
        try { downloadedSongs[mbid] = await apiGet(`/api/songs/${mbid}`); } catch { return; }
      }
      playSong(mbid);
    }

    function playSong(mbid) {
      const s = downloadedSongs[mbid];
      if (!s?.file_path) return;
      const src = s.file_path.startsWith('/') ? baseUrl() + s.file_path + '?key=' + encodeURIComponent(apiKeyEl.value) : s.file_path;
      audio.src = src; audio.play();
      document.getElementById('playerTitle').textContent = s.title;
      document.getElementById('playerArtist').textContent = s.artist;
      document.getElementById('playerArt').innerHTML = s.album_art_url ? `<img src="${escAttr(s.album_art_url)}">` : '';
      playerBar.classList.add('visible');
      document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;';
    }

    function togglePlayPause() {
      if (audio.paused) { audio.play(); document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;'; }
      else { audio.pause(); document.getElementById('playPauseBtn').innerHTML = '&#9654;'; }
    }

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      document.getElementById('progressFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
      document.getElementById('playerTime').textContent = `${fmtTime(audio.currentTime)} / ${fmtTime(audio.duration)}`;
    });
    audio.addEventListener('ended', () => { document.getElementById('playPauseBtn').innerHTML = '&#9654;'; });

    function seekAudio(e) {
      if (!audio.duration) return;
      const r = document.getElementById('progressBar').getBoundingClientRect();
      audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    }

    function fmtTime(s) { return Math.floor(s/60) + ':' + Math.floor(s%60).toString().padStart(2,'0'); }

    // === Helpers ===
    function isDownloaded(mbid) { return downloadedMbids.has(mbid) || !!downloadedSongs[mbid]; }

    function avatarHtml(artist) {
      if (artist.image_url) return `<img src="${escAttr(artist.image_url)}" alt="" loading="lazy" onerror="this.remove()">`;
      return escHtml(artist.name.split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2));
    }

    function albumArtImg(r) {
      if (!r.album_art_url) return '&#9835;';
      const fb = r.album_art_fallback ? escAttr(r.album_art_fallback) : '';
      const oe = fb
        ? `if(!this.dataset.tried){this.dataset.tried='1';this.src='${fb}'}else{this.parentElement.innerHTML='&#9835;'}`
        : `this.parentElement.innerHTML='&#9835;'`;
      return `<img src="${escAttr(r.album_art_url)}" alt="" loading="lazy" onerror="${oe}">`;
    }

    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;'); }

    // === Init ===
    (async () => { checkHealth(); await loadDownloadedSongs(); handleRoute(); })();
  </script>
</body>
</html>
